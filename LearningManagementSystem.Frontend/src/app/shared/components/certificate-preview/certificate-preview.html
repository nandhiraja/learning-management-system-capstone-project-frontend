<div class="certificate-modal-overlay" (click)="closeModal()">
  <div class="certificate-modal-card glass-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h4 class="modal-title">Certificate of Completion</h4>
      <div class="header-actions">
        <a *ngIf="cert.certificateUrl" [href]="cert.certificateUrl" target="_blank" download class="btn btn-primary btn-sm">
          <i class="bi bi-download" aria-hidden="true"></i> Download PDF
        </a>
        <button class="btn-close-modal" aria-label="Close Modal" (click)="closeModal()">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="pdf-viewer-container">
      <ng-container *ngIf="cert.certificateUrl && cert.certificateUrl.includes('.pdf'); else noPdf">
        <div class="iframe-wrapper">
          <iframe [src]="safeUrl" class="document-iframe" title="Certificate PDF Viewer" frameborder="0" width="100%" height="100%"></iframe>
        </div>
      </ng-container>
      
      <ng-template #noPdf>
        <div class="no-pdf-message">
          <i class="bi bi-file-earmark-x" aria-hidden="true"></i>
          <p>No PDF available for this certificate.</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
