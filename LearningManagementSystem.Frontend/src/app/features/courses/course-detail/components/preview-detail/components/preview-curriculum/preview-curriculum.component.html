<section class="syllabus-section" aria-labelledby="curriculum-heading">
  <h2 id="curriculum-heading" class="section-title">Course curriculum</h2>
  <p class="syllabus-summary">
    Curriculum overview containing course sections and lectures
  </p>

  <div class="accordion-list">
    @for (section of course.sections; track section.id; let idx = $index) {
      <div class="accordion-item glass-card">
        <div 
          class="accordion-trigger" 
          style="cursor: default; pointer-events: none; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; border: none; background: transparent;"
        >
          <div class="trigger-left" style="display: flex; align-items: center; gap: 4px;">
            <span class="section-name" style="font-weight: 600; font-size: 14px; color: var(--color-text);">{{ section.title }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</section>
